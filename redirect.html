<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // One page for production + staging. Add ?env=staging for Love Cycle Staging.
    // Forwards query + hash: OAuth ?code=, email #access_token=, Stripe ?session_id=, etc.
    var search = window.location.search || '';
    var hash = window.location.hash || '';
    var params = new URLSearchParams(search);
    var isStaging = params.get('env') === 'staging';
    var scheme = isStaging ? 'lovecycle-staging' : 'lovecycle';
    params.delete('env');
    var forwardSearch = params.toString() ? '?' + params.toString() : '';
    var appUrl = scheme + '://auth/callback' + forwardSearch + hash;

    window.location.href = appUrl;

    setTimeout(function () {
      document.body.innerHTML =
        '<h1>Redirecting to ' + (isStaging ? 'Love Cycle Staging' : 'Love Cycle') + '…</h1>' +
        '<p>If the app does not open, return to it manually.</p>';
    }, 1000);
  </script>
</head>
<body>
  <p>Redirecting to app...</p>
</body>
</html>
