<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // Forward the full query string and hash so OAuth (?code=), email links
    // (#access_token=), and Stripe (?session_id= / ?canceled=) all reach the app.
    var search = window.location.search || '';
    var hash = window.location.hash || '';
    var appUrl = 'lovecycle://auth/callback' + search + hash;

    window.location.href = appUrl;

    setTimeout(function () {
      document.body.innerHTML =
        '<h1>Redirecting to Love Cycle…</h1><p>If the app does not open, return to it manually.</p>';
    }, 1000);
  </script>
</head>
<body>
  <p>Redirecting to app...</p>
</body>
</html>
